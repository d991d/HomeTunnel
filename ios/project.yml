# HomeTunnel iOS — xcodegen project spec
# Install: brew install xcodegen
# Usage:   cd ios && xcodegen generate

name: HomeTunnel
options:
  bundleIdPrefix: io.github.d991d
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Debug
  xcodeVersion: "15"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.9"
  ENABLE_BITCODE: "NO"
  IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:

  # ── Main app ────────────────────────────────────────────────────────────────
  HomeTunnel:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: HomeTunnel
        excludes:
          - "**/.DS_Store"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.d991d.hometunnel
        INFOPLIST_FILE: HomeTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: HomeTunnel/HomeTunnel.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""          # Set to your Apple Developer Team ID
        CODE_SIGN_STYLE: Automatic

    dependencies:
      - target: PacketTunnel
        embed: true
      - framework: Frameworks/HometunnelCore.xcframework
        embed: true
        codeSign: true

    preBuildScripts:
      - name: "Check Go framework"
        script: |
          if [ ! -d "${SRCROOT}/Frameworks/HometunnelCore.xcframework" ]; then
            echo "error: HometunnelCore.xcframework not found."
            echo "error: Run 'make ios-framework' from the vpn-project root first."
            exit 1
          fi

  # ── Network Extension ────────────────────────────────────────────────────────
  PacketTunnel:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: PacketTunnel
        excludes:
          - "**/.DS_Store"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.d991d.hometunnel.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        DEVELOPMENT_TEAM: ""          # Set to your Apple Developer Team ID
        CODE_SIGN_STYLE: Automatic

    dependencies:
      - framework: Frameworks/HometunnelCore.xcframework
        embed: false          # embedded only in the main app, not the extension
        codeSign: true
